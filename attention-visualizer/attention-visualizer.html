<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transformer Attention Visualizer</title>
    <style>
        html, body {
            background: #1a1a2e;
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
        }
        #app {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 10px;
        }
        #head-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .head-pill {
            background: #333;
            color: #888;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .head-pill.active {
            background: #e94560;
            color: white;
        }
        #text-panel {
            position: relative;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            min-height: 80px;
            border: 1px solid #2a2a4a;
        }
        #text-display {
            position: relative;
            z-index: 10;
            line-height: 2.2;
        }
        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: visible;
        }
        .token {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.15s ease;
            border: 3px solid transparent;
            color: #ccc;
        }
        .token:hover {
            background: rgba(255,255,255,0.05);
        }
        .token.active {
            background: #e94560;
            color: white;
            font-weight: bold;
        }
        .token.key-highlight {
            background: #f5a623;
            color: #1a1a2e;
            font-weight: bold;
        }
        #bottom-panels {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex: 1;
            min-height: 0;
        }
        #heatmap-panel, #computation-panel {
            flex: 1;
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2a2a4a;
            overflow: auto;
        }
        .panel-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .causal-mask-label {
            font-size: 10px;
            color: #666;
        }
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            background: #444;
            color: #ccc;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 16px;
            font-size: 10px;
            margin-left: 4px;
        }
        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            transition: 0.2s;
        }
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        #computation-panel {
            font-family: monospace;
        }
        #computation-content {
            font-size: 13px;
        }
        .placeholder {
            color: #555;
            font-style: italic;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>
<div id="app">
    <h1>Transformer Attention Visualizer</h1>
    <div id="head-selector">
        <button class="head-pill active" data-head="0">Head 1 (positional)</button>
        <button class="head-pill" data-head="1">Head 2 (semantic)</button>
    </div>
    <div id="text-panel">
        <div id="text-display"></div>
        <svg id="svg-overlay"></svg>
    </div>
    <div id="bottom-panels">
        <div id="heatmap-panel">
            <div class="panel-label">ATTENTION MATRIX
                <span class="causal-mask-label">Causal Mask
                    <span class="tooltip">?<span class="tooltip-text">Each token can only attend to itself and earlier tokens (prevents seeing the future)</span></span>
                </span>
            </div>
            <canvas id="heatmap-canvas"></canvas>
        </div>
        <div id="computation-panel">
            <div class="panel-label">COMPUTATION</div>
            <div id="computation-content">
                <p class="placeholder">Hover a token or click a heatmap cell</p>
            </div>
        </div>
    </div>
</div>
<script>
// mulberry32 seeded PRNG
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return hash;
}

function generateEmbedding(token, dim = 8) {
    const rng = mulberry32(hashString(token));
    const vec = Array.from({length: dim}, () => rng() * 2 - 1);
    const norm = Math.sqrt(vec.reduce((s, v) => s + v * v, 0));
    return vec.map(v => v / norm);
}

function matVecMul(matrix, vec) {
    return matrix.map(row => row.reduce((s, w, i) => s + w * vec[i], 0));
}

function dot(a, b) {
    return a.reduce((s, v, i) => s + v * b[i], 0);
}

function softmax(scores, queryIdx) {
    const masked = scores.map((s, i) => i <= queryIdx ? s : -Infinity);
    const max = Math.max(...masked.filter(s => s !== -Infinity));
    const exps = masked.map(s => s === -Infinity ? 0 : Math.exp(s - max));
    const sum = exps.reduce((a, b) => a + b, 0);
    return exps.map(e => e / sum);
}

function computeAttention(tokens, embeddings, head) {
    const dim = embeddings[0].length;
    const scale = Math.sqrt(dim);
    const n = tokens.length;
    const Q = embeddings.map(e => matVecMul(head.Wq, e));
    const K = embeddings.map(e => matVecMul(head.Wk, e));
    const weights = [];
    for (let i = 0; i < n; i++) {
        const scores = K.map(k => dot(Q[i], k) / scale);
        weights.push(softmax(scores, i));
    }
    return { weights, Q, K };
}

function generateMatrix(seed, dim = 8) {
    const rng = mulberry32(seed);
    return Array.from({length: dim}, () =>
        Array.from({length: dim}, () => (rng() * 2 - 1) * 0.5)
    );
}

function createPositionalHead() {
    const Wq = generateMatrix(42);
    const Wk = generateMatrix(43);
    for (let i = 0; i < 8; i++) {
        Wq[i][i] += 0.8;
        Wk[i][i] += 0.8;
    }
    return { Wq, Wk, Wv: generateMatrix(44) };
}

function createSemanticHead() {
    const Wq = generateMatrix(100);
    const Wk = generateMatrix(101);
    for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 8; j++) {
            Wq[i][j] *= 1.5;
            Wk[i][j] *= 1.5;
        }
    }
    return { Wq, Wk, Wv: generateMatrix(102) };
}

// Pluggable data config — matches spec interface
const modelConfig = {
    tokens: "The cat sat on the warm mat and purred softly".split(' '),
    embeddings: null,
    heads: [createPositionalHead(), createSemanticHead()]
};
modelConfig.embeddings = modelConfig.tokens.map(t => generateEmbedding(t, 8));

const TOKENS = modelConfig.tokens;
const DIM = 8;

let currentHead = 0;
let attentionData = computeAttention(TOKENS, modelConfig.embeddings, modelConfig.heads[currentHead]);

// Console smoke test
console.log('Tokens:', TOKENS);
console.log('Embedding[0] (The):', modelConfig.embeddings[0]);
console.log('Weights row 0:', attentionData.weights[0]);
console.log('Sum of row 0:', attentionData.weights[0].reduce((a, b) => a + b, 0));
</script>
</body>
</html>
