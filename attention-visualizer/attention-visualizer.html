<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transformer Attention Visualizer</title>
    <style>
        html, body {
            background: #1a1a2e;
            color: #ccc;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
        }
        #app {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 10px;
        }
        #head-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .head-pill {
            background: #333;
            color: #888;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .head-pill.active {
            background: #e94560;
            color: white;
        }
        #text-panel {
            position: relative;
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            min-height: 80px;
            border: 1px solid #2a2a4a;
        }
        #text-display {
            position: relative;
            z-index: 10;
            line-height: 2.2;
        }
        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: visible;
        }
        .token {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.15s ease;
            border: 3px solid transparent;
            color: #ccc;
        }
        .token:hover {
            background: rgba(255,255,255,0.05);
        }
        .token.active {
            background: #e94560;
            color: white;
            font-weight: bold;
        }
        .token.key-highlight {
            background: #f5a623;
            color: #1a1a2e;
            font-weight: bold;
        }
        #bottom-panels {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex: 1;
            min-height: 0;
        }
        #heatmap-panel, #computation-panel {
            flex: 1;
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2a2a4a;
            overflow: auto;
        }
        .panel-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .causal-mask-label {
            font-size: 10px;
            color: #666;
        }
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
            background: #444;
            color: #ccc;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            text-align: center;
            line-height: 16px;
            font-size: 10px;
            margin-left: 4px;
        }
        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            transition: 0.2s;
        }
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        #computation-panel {
            font-family: monospace;
        }
        #computation-content {
            font-size: 13px;
        }
        .placeholder {
            color: #555;
            font-style: italic;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>
<div id="app">
    <h1>Transformer Attention Visualizer</h1>
    <div id="head-selector">
        <button class="head-pill active" data-head="0">Head 1 (positional)</button>
        <button class="head-pill" data-head="1">Head 2 (semantic)</button>
    </div>
    <div id="text-panel">
        <div id="text-display"></div>
        <svg id="svg-overlay"></svg>
    </div>
    <div id="bottom-panels">
        <div id="heatmap-panel">
            <div class="panel-label">ATTENTION MATRIX
                <span class="causal-mask-label">Causal Mask
                    <span class="tooltip">?<span class="tooltip-text">Each token can only attend to itself and earlier tokens (prevents seeing the future)</span></span>
                </span>
            </div>
            <canvas id="heatmap-canvas"></canvas>
        </div>
        <div id="computation-panel">
            <div class="panel-label">COMPUTATION</div>
            <div id="computation-content">
                <p class="placeholder">Hover a token or click a heatmap cell</p>
            </div>
        </div>
    </div>
</div>
<script>
// mulberry32 seeded PRNG
function mulberry32(seed) {
    return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }
    return hash;
}

function generateEmbedding(token, dim = 8) {
    const rng = mulberry32(hashString(token));
    const vec = Array.from({length: dim}, () => rng() * 2 - 1);
    const norm = Math.sqrt(vec.reduce((s, v) => s + v * v, 0));
    return vec.map(v => v / norm);
}

function matVecMul(matrix, vec) {
    return matrix.map(row => row.reduce((s, w, i) => s + w * vec[i], 0));
}

function dot(a, b) {
    return a.reduce((s, v, i) => s + v * b[i], 0);
}

function softmax(scores, queryIdx) {
    const masked = scores.map((s, i) => i <= queryIdx ? s : -Infinity);
    const max = Math.max(...masked.filter(s => s !== -Infinity));
    const exps = masked.map(s => s === -Infinity ? 0 : Math.exp(s - max));
    const sum = exps.reduce((a, b) => a + b, 0);
    return exps.map(e => e / sum);
}

function computeAttention(tokens, embeddings, head) {
    const dim = embeddings[0].length;
    const scale = Math.sqrt(dim);
    const n = tokens.length;
    const Q = embeddings.map(e => matVecMul(head.Wq, e));
    const K = embeddings.map(e => matVecMul(head.Wk, e));
    const weights = [];
    for (let i = 0; i < n; i++) {
        const scores = K.map(k => dot(Q[i], k) / scale);
        weights.push(softmax(scores, i));
    }
    return { weights, Q, K };
}

function generateMatrix(seed, dim = 8) {
    const rng = mulberry32(seed);
    return Array.from({length: dim}, () =>
        Array.from({length: dim}, () => (rng() * 2 - 1) * 0.5)
    );
}

function createPositionalHead() {
    const Wq = generateMatrix(42);
    const Wk = generateMatrix(43);
    for (let i = 0; i < 8; i++) {
        Wq[i][i] += 0.8;
        Wk[i][i] += 0.8;
    }
    return { Wq, Wk, Wv: generateMatrix(44) };
}

function createSemanticHead() {
    const Wq = generateMatrix(100);
    const Wk = generateMatrix(101);
    for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 8; j++) {
            Wq[i][j] *= 1.5;
            Wk[i][j] *= 1.5;
        }
    }
    return { Wq, Wk, Wv: generateMatrix(102) };
}

// Pluggable data config — matches spec interface
const modelConfig = {
    tokens: "The cat sat on the warm mat and purred softly".split(' '),
    embeddings: null,
    heads: [createPositionalHead(), createSemanticHead()]
};
modelConfig.embeddings = modelConfig.tokens.map(t => generateEmbedding(t, 8));

const TOKENS = modelConfig.tokens;
const DIM = 8;

let currentHead = 0;
let attentionData = computeAttention(TOKENS, modelConfig.embeddings, modelConfig.heads[currentHead]);

// Console smoke test
console.log('Tokens:', TOKENS);
console.log('Embedding[0] (The):', modelConfig.embeddings[0]);
console.log('Weights row 0:', attentionData.weights[0]);
console.log('Sum of row 0:', attentionData.weights[0].reduce((a, b) => a + b, 0));

// --- Task 3: Token rendering ---
function renderTokens() {
    const display = document.getElementById('text-display');
    display.textContent = '';
    TOKENS.forEach((token, i) => {
        const span = document.createElement('span');
        span.textContent = token;
        span.classList.add('token');
        span.dataset.index = i;
        span.id = `token-${i}`;
        display.appendChild(span);
    });
}

// --- SVG line drawing helpers ---
function getTokenCenter(index) {
    const span = document.getElementById(`token-${index}`);
    const panel = document.getElementById('text-panel');
    if (!span || !panel) return null;
    const sr = span.getBoundingClientRect();
    const pr = panel.getBoundingClientRect();
    return {
        x: sr.left - pr.left + sr.width / 2,
        y: sr.top - pr.top + sr.height * 0.6
    };
}

function drawAttentionLines(queryIdx) {
    const svg = document.getElementById('svg-overlay');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const weights = attentionData.weights[queryIdx];
    const targetPos = getTokenCenter(queryIdx);
    if (!targetPos) return;

    weights.forEach((w, keyIdx) => {
        if (w < 0.01 || keyIdx > queryIdx) return;
        const sourcePos = getTokenCenter(keyIdx);
        if (!sourcePos) return;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', sourcePos.x);
        line.setAttribute('y1', sourcePos.y);
        line.setAttribute('x2', targetPos.x);
        line.setAttribute('y2', targetPos.y);
        // Interpolate red to orange based on weight
        const r = Math.round(233 + w * (245 - 233));
        const g = Math.round(69 + w * (166 - 69));
        const b = Math.round(96 + w * (35 - 96));
        line.setAttribute('stroke', `rgb(${r}, ${g}, ${b})`);
        line.setAttribute('stroke-width', 0.5 + w * 7.5);
        line.setAttribute('opacity', 0.2 + w * 0.8);
        line.setAttribute('stroke-linecap', 'round');
        svg.appendChild(line);
    });
}

function drawSingleAttentionLine(queryIdx, keyIdx) {
    const svg = document.getElementById('svg-overlay');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const w = attentionData.weights[queryIdx][keyIdx];
    const sourcePos = getTokenCenter(keyIdx);
    const targetPos = getTokenCenter(queryIdx);
    if (!sourcePos || !targetPos) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', sourcePos.x);
    line.setAttribute('y1', sourcePos.y);
    line.setAttribute('x2', targetPos.x);
    line.setAttribute('y2', targetPos.y);
    const r = Math.round(233 + w * (245 - 233));
    const g = Math.round(69 + w * (166 - 69));
    const b = Math.round(96 + w * (35 - 96));
    line.setAttribute('stroke', `rgb(${r}, ${g}, ${b})`);
    line.setAttribute('stroke-width', 0.5 + w * 7.5);
    line.setAttribute('opacity', 0.2 + w * 0.8);
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
}

// --- State stubs (replaced in later tasks) ---
let clickState = null;

let heatmapCellSize = 0;
let heatmapLabelOffset = 0;

function weightToColor(w) {
    const r = Math.round(w * 245 + 10);
    const g = Math.round(w * 166);
    const b = Math.round(w * 35);
    return `rgb(${r}, ${g}, ${b})`;
}

function renderHeatmap(highlightRow = -1, highlightCell = null) {
    const canvas = document.getElementById('heatmap-canvas');
    const ctx = canvas.getContext('2d');
    const n = TOKENS.length;
    const weights = attentionData.weights;

    const cellSize = Math.min(Math.floor((canvas.parentElement.clientWidth - 80) / (TOKENS.length + 1)), 36);
    heatmapCellSize = cellSize;
    const labelOffset = cellSize + 20;
    heatmapLabelOffset = labelOffset;

    canvas.width = labelOffset + n * cellSize + 10;
    canvas.height = labelOffset + n * cellSize + 10;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = '11px monospace';

    // Column labels (key tokens) rotated -45 degrees
    for (let j = 0; j < n; j++) {
        ctx.save();
        ctx.translate(labelOffset + j * cellSize + cellSize / 2, labelOffset - 4);
        ctx.rotate(-Math.PI / 4);
        ctx.fillStyle = '#888';
        ctx.textAlign = 'left';
        ctx.fillText(TOKENS[j], 0, 0);
        ctx.restore();
    }

    // Row labels (query tokens)
    for (let i = 0; i < n; i++) {
        ctx.fillStyle = (i === highlightRow) ? '#e94560' : '#888';
        ctx.textAlign = 'right';
        ctx.fillText(TOKENS[i], labelOffset - 4, labelOffset + i * cellSize + cellSize / 2 + 4);
    }

    // Cells
    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
            if (j > i) {
                ctx.fillStyle = 'rgba(50, 50, 50, 0.5)';
            } else {
                ctx.fillStyle = weightToColor(weights[i][j]);
            }
            ctx.fillRect(labelOffset + j * cellSize + 1, labelOffset + i * cellSize + 1, cellSize - 2, cellSize - 2);
        }
    }

    // Highlight cell
    if (highlightCell) {
        const [row, col] = highlightCell;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(labelOffset + col * cellSize + 1, labelOffset + row * cellSize + 1, cellSize - 2, cellSize - 2);
    }

    // Highlight row
    if (highlightRow >= 0) {
        ctx.strokeStyle = 'rgba(233, 69, 96, 0.6)';
        ctx.lineWidth = 2;
        ctx.strokeRect(labelOffset + 1, labelOffset + highlightRow * cellSize + 1, n * cellSize - 2, cellSize - 2);
    }
}

document.getElementById('heatmap-canvas').addEventListener('click', e => {
    const canvas = e.target;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const col = Math.floor((x - heatmapLabelOffset) / heatmapCellSize);
    const row = Math.floor((y - heatmapLabelOffset) / heatmapCellSize);
    if (row >= 0 && row < TOKENS.length && col >= 0 && col <= row) {
        setClickState(row, col);
    }
});

function setClickState() {} // stub until Task 6
function renderComputationSummary() {} // no-op until Task 5

function clearHoverState() {
    document.querySelectorAll('.token').forEach(s => {
        s.classList.remove('active', 'key-highlight');
        s.style.borderColor = 'transparent';
        s.style.borderWidth = '';
    });
    const svg = document.getElementById('svg-overlay');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
}

function clearAllHighlights() {
    clearHoverState();
    renderHeatmap();
    const content = document.getElementById('computation-content');
    content.textContent = '';
    const p = document.createElement('p');
    p.className = 'placeholder';
    p.textContent = 'Hover a token or click a heatmap cell';
    content.appendChild(p);
}

function hoverQuery(queryIdx) {
    if (clickState) return;
    highlightTokens(queryIdx);
    drawAttentionLines(queryIdx);
    renderHeatmap(queryIdx);
}

// --- Token highlighting ---
function highlightTokens(queryIdx) {
    document.querySelectorAll('.token').forEach(s => {
        s.classList.remove('active', 'key-highlight');
        s.style.borderColor = 'transparent';
        s.style.borderWidth = '';
    });
    const querySpan = document.getElementById(`token-${queryIdx}`);
    if (querySpan) querySpan.classList.add('active');

    const weights = attentionData.weights[queryIdx];
    weights.forEach((w, keyIdx) => {
        if (w < 0.01 || keyIdx === queryIdx || keyIdx > queryIdx) return;
        const span = document.getElementById(`token-${keyIdx}`);
        if (span) {
            span.style.borderColor = '#f5a623';
            span.style.borderWidth = `${1 + w * 3}px`;
        }
    });
}

// --- Event listeners + initialization ---
document.getElementById('text-display').addEventListener('mouseover', e => {
    if (!e.target.classList.contains('token')) return;
    if (clickState) return;
    const idx = parseInt(e.target.dataset.index, 10);
    hoverQuery(idx);
});

document.getElementById('text-panel').addEventListener('mouseleave', () => {
    if (!clickState) clearAllHighlights();
});

// Initialize
renderTokens();
renderHeatmap();
</script>
</body>
</html>
